<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    #chat-box {
      height: 70vh;
      overflow-y: auto;
      background: #f8f9fa;
    }

    .bubble {
      max-width: 75%;
      word-break: break-word;
      white-space: pre-wrap;
    }
  </style>
</head>
<body class="bg-white">

  <div class="container py-4" style="max-width: 680px;">
    <h5 class="mb-3 fw-bold">Chat</h5>

    <div id="chat-box" class="border rounded p-3 mb-3 d-flex flex-column gap-2">
      <p class="text-muted small text-center mb-0">Send a message to start.</p>
    </div>

    <div class="input-group">
      <input id="user-input" type="text" class="form-control" placeholder="Type a message..."/>
      <button id="send-btn" class="btn btn-dark">Send</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script>
    const API_URL = "/chat";

    function appendMessage(text, isUser) {
      const align = isUser ? "align-self-end" : "align-self-start";
      const bg    = isUser ? "bg-dark text-white" : "bg-white border";
      const bubble = $(`<div class="bubble rounded p-2 px-3 small ${align} ${bg}">${text}</div>`);
      $("#chat-box").append(bubble);
      $("#chat-box").scrollTop($("#chat-box")[0].scrollHeight);
    }

    function sendMessage() {
      const text = $("#user-input").val().trim();
      if (!text) return;

      // Clear the first-time placeholder
      $("#chat-box p.text-muted").remove();

      appendMessage(text, true);
      $("#user-input").val("");
      $("#send-btn").prop("disabled", true).text("...");

      $.ajax({
        url: API_URL,
        method: "POST",
        contentType: "application/json",
        data: JSON.stringify({ message: text }),
        success(res) {
          appendMessage(res.message, false);
        },
        error() {
          appendMessage("⚠️ Could not reach the server.", false);
        },
        complete() {
          $("#send-btn").prop("disabled", false).text("Send");
          $("#user-input").focus();
        }
      });
    }

    $("#send-btn").on("click", sendMessage);
    $("#user-input").on("keydown", function(e) {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
